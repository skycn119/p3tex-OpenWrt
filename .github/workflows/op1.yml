name: Op1

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/skycn119/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config1
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          git checkout v25.12.2
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH    

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Ensure PPP source exists and apply syncppp
        run: |
          set -e
          cd openwrt
        
          echo "🔍 Step 1: Force download and prepare PPP..."
          make package/network/services/ppp/download V=s
          make package/network/services/ppp/prepare V=s
        
          echo "🔍 Step 2: Waiting for source files to appear..."
          # 给系统一点时间完成解压（关键步骤）
          sleep 15
        
          echo "🔍 Step 3: Dynamically find pppd.c..."
          # 从 build_dir 根开始找，不假设任何目录结构
          PPPD_FILE=$(find build_dir -name pppd.c -type f 2>/dev/null | head -1)
        
          if [ -z "$PPPD_FILE" ]; then
            echo "❌ ERROR: pppd.c still not found!"
            echo "Listing build_dir structure:"
            ls -la build_dir/
            echo "Listing target directory:"
            ls -la build_dir/target-mipsel_24kc_musl/ 2>/dev/null || echo "Target dir empty"
            echo "Searching deeper for any ppp related files:"
            find build_dir -type f -name "*ppp*" | head -20
            exit 1
          fi
        
          echo "✅ Found pppd.c at: $PPPD_FILE"
          PPP_DIR=$(dirname "$PPPD_FILE")
          echo "✅ Using PPP directory: $PPP_DIR"
        
          cd "$PPP_DIR"
        
          echo "🔧 Step 4: Applying syncppp code..."
        
          # 1. Header
          cat > syncppp.h << 'EOF'
          #ifndef SYNCPP_H
          #define SYNCPP_H
          #define SEM_BLOCK_NAME "block"
          #define SEM_COUNT_NAME "count"
          #define SYNCPPP_TIMEOUT 5
          extern int syncppp(int nproc);
          #endif
          EOF
          
                  # 2. Source (Robust version)
                  cat > syncppp.c << 'EOF'
          #include <stdio.h>
          #include <semaphore.h>
          #include <fcntl.h>
          #include <stdlib.h>
          #include <time.h>
          #include <errno.h>
          #include "pppd-private.h"
          #include "syncppp.h"
          
          int syncppp(int nproc) {
              if (nproc <= 1) { error("syncppp: npppd must be > 1"); return -1; }
              sem_t *block = sem_open(SEM_BLOCK_NAME, O_CREAT, 0644, 0);
              sem_t *count = sem_open(SEM_COUNT_NAME, O_CREAT, 0644, 0);
              if (block == SEM_FAILED || count == SEM_FAILED) { error("syncppp: sem_open failed"); return -1; }
              sem_post(count);
              int val = 0; sem_getvalue(count, &val);
              info("%d pppd arrived, waiting for %d", val, nproc - val);
              if (val >= nproc) { for (int i = 1; i < nproc; i++) sem_post(block); }
              else {
                  struct timespec ts; clock_gettime(CLOCK_REALTIME, &ts); ts.tv_sec += SYNCPPP_TIMEOUT;
                  if (sem_timedwait(block, &ts) < 0) { error("syncppp: timeout"); return -1; }
              }
              sem_close(block); sem_close(count);
              sem_unlink(SEM_BLOCK_NAME); sem_unlink(SEM_COUNT_NAME);
              return 0;
          }
          EOF
          
                  # 3. Makefile.am
                  if ! grep -q "syncppp.h" Makefile.am; then
                    sed -i '/noinst_HEADERS = \\/a\\tsyncppp.h \\' Makefile.am
                  fi
                  if ! grep -q "syncppp.c" Makefile.am; then
                    sed -i '/pppd_SOURCES = \\/a\\tsyncppp.c \\' Makefile.am
                  fi
                  sed -i 's/^pppd_LDFLAGS =$/pppd_LDFLAGS = -pthread/' Makefile.am
                  sed -i 's/^pppd_LIBS =$/pppd_LIBS = -lpthread/' Makefile.am
          
                  # 4. options.c (Default npppd=2)
                  if ! grep -q "int npppd = 2" options.c; then
                    sed -i '/int\tchild_wait = 5;/a int\tnpppd = 2;\t\t\/\* sync \*\/' options.c
                  fi
                  if ! grep -q '"syncppp"' options.c; then
                    sed -i '/"Unset user environment variable",/a \t{ "syncppp", o_int, &npppd,\n\t  "sync pppd", OPT_PRIO },' options.c
                  fi
          
                  # 5. chap.c
                  if ! grep -q "#include <semaphore.h>" chap.c; then
                    sed -i '/#include "chap-md5.h"/a #include <semaphore.h>\n#include "syncppp.h"' chap.c
                  fi
                  if ! grep -q "syncppp(npppd)" chap.c; then
                    sed -i '/output(0, response, PPP_HDRLEN + len);/i \	if (npppd > 1) {\n\t\tif (syncppp(npppd) < 0) { error("sync fail"); sem_unlink(SEM_COUNT_NAME); sem_unlink(SEM_BLOCK_NAME); }\n\t\telse { info("sync ok"); }\n\t} else { info("sync inactive"); }' chap.c
                  fi
          
                  # 6. upap.c
                  if ! grep -q "#include <semaphore.h>" upap.c; then
                    sed -i '/#include "upap.h"/a #include <semaphore.h>\n#include "syncppp.h"' upap.c
                  fi
                  if ! grep -q "syncppp(npppd)" upap.c; then
                    sed -i '/output(u->us_unit, outpacket_buf, outlen + PPP_HDRLEN);/i \	if (npppd > 1) {\n\t\tif (syncppp(npppd) < 0) { error("sync fail"); sem_unlink(SEM_COUNT_NAME); sem_unlink(SEM_BLOCK_NAME); }\n\t\telse { info("sync ok"); }\n\t} else { info("sync inactive"); }' upap.c
                  fi
          
                  echo "✅ syncppp applied successfully"
        
      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@main
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: actions/upload-artifact@main
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          [ ${UPLOAD_GOFILE} = true && ${{ steps.gofile.outputs.url }} ] && echo "🔗 [GoFile](${{ steps.gofile.outputs.url }})" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@master
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@master
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
