name: Op1

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/skycn119/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config1
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          git checkout v25.12.2
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH    

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Force inject syncppp during compile
        run: |
          set -e
          
          echo "🚀 Injecting syncppp directly into compile process..."
          
          # 我们不找目录，而是直接修改 Makefile，让它在编译时自动创建文件
          # 1. 修改 pppd 的 Makefile.am
          PPP_MAKEFILE="openwrt/package/network/services/ppp/files/Makefile"
          
          if [ ! -f "$PPP_MAKEFILE" ]; then
            echo "❌ Cannot find $PPP_MAKEFILE"
            # 尝试另一个常见路径
            PPP_MAKEFILE="openwrt/package/network/services/ppp/Makefile"
            if [ ! -f "$PPP_MAKEFILE" ]; then
              echo "❌ Still cannot find Makefile. Listing package dir:"
              ls -la openwrt/package/network/services/ppp/
              exit 1
            fi
          fi
          
          echo "✅ Found Makefile: $PPP_MAKEFILE"
          
          # 2. 在 Makefile 末尾添加强制创建文件的指令
          # 注意：这是 OpenWrt 的 Makefile，语法特殊
          cat >> "$PPP_MAKEFILE" << 'EOF'

          define Build/Prepare
          	$(call Build/Prepare/Default)
          	# Force create syncppp files
          	( \
          	  cd $(PKG_BUILD_DIR)/pppd; \
          	  echo "#ifndef SYNCPP_H" > syncppp.h; \
          	  echo "#define SYNCPP_H" >> syncppp.h; \
          	  echo "#define SEM_BLOCK_NAME \"block\"" >> syncppp.h; \
          	  echo "#define SEM_COUNT_NAME \"count\"" >> syncppp.h; \
          	  echo "#define SYNCPPP_TIMEOUT 5" >> syncppp.h; \
          	  echo "extern int syncppp(int nproc);" >> syncppp.h; \
          	  echo "#endif" >> syncppp.h; \
          	  \
          	  echo "#include <stdio.h>" > syncppp.c; \
          	  echo "#include <semaphore.h>" >> syncppp.c; \
          	  echo "#include <fcntl.h>" >> syncppp.c; \
          	  echo "#include <stdlib.h>" >> syncppp.c; \
          	  echo "#include <time.h>" >> syncppp.c; \
          	  echo "#include <errno.h>" >> syncppp.c; \
          	  echo "#include \"pppd-private.h\"" >> syncppp.c; \
          	  echo "#include \"syncppp.h\"" >> syncppp.c; \
          	  echo "int syncppp(int nproc) {" >> syncppp.c; \
          	  echo "    if (npppd <= 1) return -1;" >> syncppp.c; \
          	  echo "    sem_t *b = sem_open(SEM_BLOCK_NAME, O_CREAT, 0644, 0);" >> syncppp.c; \
          	  echo "    sem_t *c = sem_open(SEM_COUNT_NAME, O_CREAT, 0644, 0);" >> syncppp.c; \
          	  echo "    if (b == SEM_FAILED || c == SEM_FAILED) return -1;" >> syncppp.c; \
          	  echo "    sem_post(c);" >> syncppp.c; \
          	  echo "    int v = 0; sem_getvalue(c, &v);" >> syncppp.c; \
          	  echo "    if (v >= npppd) for (int i = 0; i < npppd - 1; i++) sem_post(b);" >> syncppp.c; \
          	  echo "    else { struct timespec ts; clock_gettime(CLOCK_REALTIME, &ts); ts.tv_sec += SYNCPPP_TIMEOUT; sem_timedwait(b, &ts); }" >> syncppp.c; \
          	  echo "    sem_close(b); sem_close(c);" >> syncppp.c; \
          	  echo "    sem_unlink(SEM_COUNT_NAME); sem_unlink(SEM_BLOCK_NAME);" >> syncppp.c; \
          	  echo "    return 0;" >> syncppp.c; \
          	  echo "}" >> syncppp.c; \
          	)
          endef
          EOF
                  
                  echo "✅ Injected file creation into Makefile"
                  
                  # 3. 修改 options.c 默认值为 2 (这个文件在源码里，我们只能祈祷路径对了)
                  # 我们尝试在 prepare 之后立即修改
                  cd openwrt
                  make package/network/services/ppp/prepare V=s
                  
                  # 给点时间
                  sleep 5
                  
                  # 暴力查找并修改
                  find build_dir -name "options.c" -path "*pppd*" | while read -r file; do
                    if grep -q "int\tchild_wait = 5;" "$file"; then
                      echo "Modifying $file"
                      sed -i '/int\tchild_wait = 5;/a int\tnpppd = 2;\t\t\/\* sync \*\/' "$file"
                    fi
                  done
                  
                  echo "✅ Attempted to set default npppd=2"

      - name: Start SSH before compile
        if: always()
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
     
      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@main
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: actions/upload-artifact@main
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          [ ${UPLOAD_GOFILE} = true && ${{ steps.gofile.outputs.url }} ] && echo "🔗 [GoFile](${{ steps.gofile.outputs.url }})" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@master
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@master
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
