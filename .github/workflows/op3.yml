name: Op3

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/skycn119/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config3
  DIY_P1_SH: diy-part4.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          git checkout v25.12.2
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH    

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Apply syncppp directly (bulletproof)
        run: |
          set -e
          PPP_BASE="/workdir/openwrt/build_dir/target-mipsel_24kc_musl/linux-ramips_mt7621"
          PPP_SRC=$(find "$PPP_BASE" -type d -name "ppp-2.5.2" 2>/dev/null | head -1)
          if [ -z "$PPP_SRC" ]; then
            echo "❌ PPP source not found"
            find /workdir/openwrt/build_dir -type d -name "*ppp*" | head -10
            exit 1
          fi
          PPP_DIR="$PPP_SRC/pppd"
          echo "✅ Found PPP at: $PPP_DIR"
          cd "$PPP_DIR"
          
          cat > syncppp.h << 'EOF'
          #ifndef SYNCPP_H
          #define SYNCPP_H
          #define SEM_BLOCK_NAME "block"
          #define SEM_COUNT_NAME "count"
          #define SYNCPPP_TIMEOUT 5
          extern int syncppp(int nproc);
          #endif
          EOF
          
                  cat > syncppp.c << 'EOF'
          #include <stdio.h>
          #include <semaphore.h>
          #include <fcntl.h>
          #include <stdlib.h>
          #include <time.h>
          #include <errno.h>
          #include "pppd-private.h"
          #include "syncppp.h"
          int syncppp(int nproc) {
              if (nproc <= 1) return -1;
              sem_t *b = sem_open(SEM_BLOCK_NAME, O_CREAT, 0644, 0);
              sem_t *c = sem_open(SEM_COUNT_NAME, O_CREAT, 0644, 0);
              if (b == SEM_FAILED || c == SEM_FAILED) return -1;
              sem_post(c);
              int v = 0; sem_getvalue(c, &v);
              if (v >= nproc) for (int i = 0; i < nproc - 1; i++) sem_post(b);
              else { struct timespec ts; clock_gettime(CLOCK_REALTIME, &ts); ts.tv_sec += SYNCPPP_TIMEOUT; sem_timedwait(b, &ts); }
              sem_close(b); sem_close(c);
              sem_unlink(SEM_COUNT_NAME); sem_unlink(SEM_BLOCK_NAME);
              return 0;
          }
          EOF
          
                  sed -i '/noinst_HEADERS = \\/a\\tsyncppp.h \\' Makefile.am
                  sed -i '/pppd_SOURCES = \\/a\\tsyncppp.c \\' Makefile.am
                  sed -i 's/^pppd_LDFLAGS =$/pppd_LDFLAGS = -pthread/' Makefile.am
                  sed -i 's/^pppd_LIBS =$/pppd_LIBS = -lpthread/' Makefile.am
                  sed -i '/int\tchild_wait = 5;/a int\tnpppd = 2;\t\t\/\* sync \*\/' options.c
                  sed -i '/"Unset user environment variable",/a \t{ "syncppp", o_int, &npppd,\n\t  "sync pppd", OPT_PRIO },' options.c
                  sed -i '/#include "chap-md5.h"/a #include <semaphore.h>\n#include "syncppp.h"' chap.c
                  sed -i '/output(0, response, PPP_HDRLEN + len);/i \	if (npppd > 1) {\n\t\tif (syncppp(npppd) < 0) error("sync fail");\n\t\telse info("sync ok");\n\t} else info("sync inactive");' chap.c
                  sed -i '/#include "upap.h"/a #include <semaphore.h>\n#include "syncppp.h"' upap.c
                  sed -i '/output(u->us_unit, outpacket_buf, outlen + PPP_HDRLEN);/i \	if (npppd > 1) {\n\t\tif (syncppp(npppd) < 0) error("sync fail");\n\t\telse info("sync ok");\n\t} else info("sync inactive");' upap.c
                  echo "✅ syncppp applied"
        
      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@main
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: actions/upload-artifact@main
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          touch release.txt
          [ ${UPLOAD_GOFILE} = true && ${{ steps.gofile.outputs.url }} ] && echo "🔗 [GoFile](${{ steps.gofile.outputs.url }})" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@master
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@master
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
